spring:
  application:
    name: foodhub-api
  
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/foodhub}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          time_zone: UTC
  
  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1
  error:
    include-message: always
    include-binding-errors: always

# Application Configuration
app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-change-this-in-production}
    expiration: 86400000 # 24 hours in milliseconds
  
  otp:
    length: 6
    expiration: 3600000 # 60 minutes (1 hour) in milliseconds
    max-attempts: 3
  
  delivery:
    default-fee: 5.00
    default-time: 45 # minutes
  
  payment:
    provider: paystack
    paystack:
      secret-key: ${PAYSTACK_SECRET_KEY:}
      public-key: ${PAYSTACK_PUBLIC_KEY:}
      base-url: https://api.paystack.co
      callback-url: ${PAYSTACK_CALLBACK_URL:}
    mobile-money:
      providers: mtn,vodafone,airteltigo
    otp:
      length: 6
      expiration: 600000 # 10 minutes
      max-attempts: 3
  
  sms:
    provider: paystack
    paystack:
      secret-key: ${PAYSTACK_SECRET_KEY:}
      sender-id: FoodHub
    enabled: ${SMS_ENABLED:true}
  
  maps:
    google-api-key: ${GOOGLE_MAPS_API_KEY:}
  
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002}
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true

# Logging
logging:
  level:
    root: INFO
    com.foodhub: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Profiles
---
spring:
  config:
    activate:
      on-profile: production

  jpa:
    show-sql: false

logging:
  level:
    root: WARN
    com.foodhub: INFO
    org.hibernate.SQL: WARN

---
spring:
  config:
    activate:
      on-profile: development

  jpa:
    show-sql: true

app:
  sms:
    enabled: false # Disable SMS in development
